<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CECI — Agende sua avaliação</title>
  <meta name="description" content="Responda algumas perguntas rápidas e agende sua avaliação na CECI.">
  <meta name="robots" content="noindex">

  <meta property="og:title" content="CECI — Agende sua avaliação">
  <meta property="og:description" content="Responda algumas perguntas rápidas e agende sua avaliação na CECI.">
  <meta property="og:image" content="/odonto/assets/logo-ceci.png">
  <meta property="og:type" content="website">

  <link rel="icon" type="image/png" href="/odonto/assets/logo-ceci.png">
  <link rel="preload" as="image" href="/odonto/assets/logo-ceci.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://connect.facebook.net" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --rose: #A97070;          /* círculo da logo */
      --rose-dark: #8F5B5B;
      --rose-soft: #EBD9D4;
      --cream: #F7F0E8;         /* letras da logo, clareado p/ fundo */
      --ink: #4A3535;
      --ink-soft: #8A7070;
      --white: #FFFFFF;
      --radius: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--cream);
      color: var(--ink);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .serif { font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif; }

    /* ---- progress bar ---- */
    #progress {
      position: fixed; top: 0; left: 0; right: 0; height: 4px;
      background: var(--rose-soft); z-index: 10;
    }
    #progress-fill {
      height: 100%; width: 0%;
      background: var(--rose);
      transition: width .4s cubic-bezier(.4,0,.2,1);
    }

    /* ---- header ---- */
    header {
      position: fixed; top: 4px; left: 0; right: 0; z-index: 9;
      display: flex; justify-content: center; padding: 14px 0 8px;
      pointer-events: none;
      transition: opacity .25s ease;
    }
    /* Some screens (ex: a pergunta com vídeo) são mais altas que a viewport.
       A logo some ao rolar para não ficar flutuando sobre o conteúdo. */
    header.header-hidden { opacity: 0; }
    header img { width: 44px; height: 44px; border-radius: 50%; box-shadow: 0 2px 10px rgba(74,53,53,.12); }

    /* ---- screens ---- */
    main { min-height: 100%; display: grid; place-items: center; padding: 96px 20px 40px; }
    .screen {
      width: 100%; max-width: 620px;
      opacity: 0; transform: translateY(16px);
      animation: enter .45s cubic-bezier(.2,.7,.3,1) forwards;
    }
    @keyframes enter { to { opacity: 1; transform: translateY(0); } }
    .screen.leaving { animation: leave .25s ease-in forwards; }
    @keyframes leave { to { opacity: 0; transform: translateY(-14px); } }

    .step-tag {
      font-size: .8rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--rose); font-weight: 600; margin-bottom: .75rem;
    }
    h1, h2 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-weight: 600; line-height: 1.15; margin: 0 0 .5rem;
      color: var(--ink);
    }
    h1 { font-size: clamp(2.1rem, 6vw, 3.1rem); }
    h2 { font-size: clamp(1.6rem, 5vw, 2.3rem); }
    .sub { color: var(--ink-soft); font-size: 1.05rem; margin: 0 0 1.75rem; }

    /* ---- options ---- */
    .options { display: grid; gap: .65rem; margin-top: 1.5rem; }
    .opt {
      display: flex; align-items: center; gap: .85rem;
      width: 100%; text-align: left;
      background: var(--white);
      border: 1.5px solid var(--rose-soft);
      border-radius: var(--radius);
      padding: .95rem 1.1rem;
      font: inherit; font-size: 1.05rem; color: var(--ink);
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .1s;
    }
    .opt:hover { border-color: var(--rose); background: #FDF9F5; }
    .opt:active { transform: scale(.985); }
    .opt.selected { background: var(--rose); border-color: var(--rose); color: #fff; }
    .opt .key {
      flex: 0 0 auto; width: 1.7rem; height: 1.7rem;
      display: grid; place-items: center;
      border: 1.5px solid currentColor; border-radius: 6px;
      font-size: .8rem; font-weight: 700; opacity: .75;
    }

    /* ---- text inputs ---- */
    .field { margin-top: 1.5rem; }
    .field input {
      width: 100%;
      font: inherit; font-size: 1.15rem; color: var(--ink);
      background: transparent;
      border: none; border-bottom: 2px solid var(--rose-soft);
      padding: .6rem 2px; outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-color: var(--rose); }
    .field input::placeholder { color: #C7B2AC; }
    .error { color: #B04A4A; font-size: .9rem; margin-top: .5rem; min-height: 1.2em; }

    /* ---- buttons / nav ---- */
    .actions { display: flex; align-items: center; gap: 1rem; margin-top: 1.75rem; }
    .btn {
      font: inherit; font-weight: 600; font-size: 1.05rem;
      background: var(--rose); color: #fff;
      border: none; border-radius: 10px;
      padding: .85rem 1.9rem; cursor: pointer;
      transition: background .15s, transform .1s;
      box-shadow: 0 4px 14px rgba(169,112,112,.28);
    }
    .btn:hover { background: var(--rose-dark); }
    .btn:active { transform: scale(.97); }
    .back {
      background: none; border: none; cursor: pointer;
      color: var(--ink-soft); font: inherit; font-size: .9rem;
      padding: .4rem .2rem; margin-top: 2.25rem;
      display: inline-flex; align-items: center; gap: .35rem;
    }
    .back:hover { color: var(--ink); }
    .back.hidden { visibility: hidden; }

    /* ---- video (controle total: só play, sem avançar/retroceder) ---- */
    .video-wrap {
      position: relative; width: 100%; aspect-ratio: 16 / 9;
      border-radius: var(--radius); overflow: hidden;
      background: #2A1F1F; margin: 1.25rem 0 .25rem;
      box-shadow: 0 6px 24px rgba(74,53,53,.18);
    }
    .video-wrap video {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .video-play {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--rose); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 18px rgba(0,0,0,.4);
      transition: background .15s, transform .15s;
    }
    .video-play:hover { background: var(--rose-dark); transform: translate(-50%,-50%) scale(1.05); }
    .video-play.hidden { display: none; }
    /* Barra abaixo do vídeo — só indicador visual, não é clicável/arrastável
       (mesma trava de "sem seek" do player continua valendo). */
    .video-progress-track {
      width: 100%; height: 4px; border-radius: 2px;
      background: var(--rose-soft); overflow: hidden;
      margin: .6rem 0 1.25rem;
    }
    .video-progress-fill {
      height: 100%; width: 0%; background: var(--rose);
      transition: width .15s linear;
    }

    /* ---- welcome / final ---- */
    .logo-big {
      width: 108px; height: 108px; border-radius: 50%;
      box-shadow: 0 8px 30px rgba(169,112,112,.30);
      margin-bottom: 1.75rem;
    }
    .center { text-align: center; }
    .center .options, .center .actions { justify-content: center; }

    /* ---- botão do WhatsApp (tela final) ---- */
    .whatsapp-btn {
      display: inline-flex; align-items: center; gap: .6rem;
      font: inherit; font-weight: 600; font-size: 1.05rem;
      background: #25D366; color: #fff;
      border: none; border-radius: 10px;
      padding: .85rem 1.9rem; margin-top: 1.5rem;
      text-decoration: none; cursor: pointer;
      transition: background .15s, transform .1s;
      box-shadow: 0 4px 14px rgba(37,211,102,.35);
    }
    .whatsapp-btn:hover { background: #1EBE5A; }
    .whatsapp-btn:active { transform: scale(.97); }

    /* ---- rodapé legal ---- */
    .legal-footer {
      text-align: center; padding: 1.5rem 20px 2rem;
      font-size: .8rem; color: var(--ink-soft);
    }
    .legal-footer a { color: var(--ink-soft); text-decoration: underline; }
    .legal-footer a:hover { color: var(--ink); }
    .legal-footer .dot { margin: 0 .5rem; opacity: .6; }
  </style>

  <!-- Meta Pixel — só inicializa com um ID numérico real (Etapa 5 do deploy) -->
  <script>
    window.META_PIXEL_ID = '1770699276479441'; // Pixel CECI
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    if (/^\d+$/.test(window.META_PIXEL_ID)) {
      fbq('init', window.META_PIXEL_ID);
      fbq('track', 'PageView');
    }
  </script>
</head>
<body>

<div id="progress"><div id="progress-fill"></div></div>
<header><img src="/odonto/assets/logo-ceci.png" alt="CECI"></header>
<main><div id="screen-root"></div></main>

<footer class="legal-footer">
  <a href="/odonto/privacidade/" target="_blank" rel="noopener">Política de Privacidade</a>
  <span class="dot">&middot;</span>
  <a href="/odonto/termos/" target="_blank" rel="noopener">Termos de Uso</a>
</footer>

<script>
(function () {
  'use strict';

  // =========================================================================
  // CONFIGURAÇÃO — perguntas e qualificação (ajuste aqui)
  //
  // >>> PERGUNTAS PLACEHOLDER — substituir pelo conteúdo real do cliente. <<<
  //
  // Tipos suportados:
  //   'choice'  → opções clicáveis (options: [{ value, label }])
  //   'text'    → campo de texto livre
  //   'email'   → campo com validação de e-mail (dispara o evento Lead)
  //   'phone'   → campo com validação de telefone BR
  //
  // `video` (opcional, qualquer tipo de pergunta): caminho de um mp4 em
  // /assets/. Renderiza com player customizado — sem controles nativos, só
  // um botão de play na paleta da página; não expõe barra de progresso, então
  // não dá pra avançar/retroceder (ver wiring de #q-video em renderQuestion).
  //
  // Lógica condicional: qualquer pergunta pode ter next(value, answers) que
  // retorna o `key` da próxima tela — sem next, segue a ordem do array.
  // Retornando EXIT_SENTINEL em vez de um key, o formulário encerra ali com
  // uma tela de saída (ver exitFlow) em vez de seguir pras próximas perguntas.
  // =========================================================================

  const EXIT_SENTINEL = '__EXIT__';

  const QUESTIONS = [
    {
      key: 'regiao',
      type: 'choice',
      tag: 'Pergunta 1',
      title: 'Em qual região você mora?',
      sub: 'A CECI fica na Penha, Zona Leste.',
      options: [
        { value: 'penha_carrao_tatuape_mooca', label: 'Penha, Carrão, Tatuapé, Mooca' },
        { value: 'santana_guarulhos_zona_norte', label: 'Santana, Guarulhos ou outra região da Zona Norte' },
        { value: 'zona_oeste_sul', label: 'Zona Oeste ou Zona Sul' },
        { value: 'outra_regiao_posso_ir', label: 'Nenhuma dessas regiões, mas posso ir até a clínica' },
        { value: 'longe_nao_posso_ir', label: 'Estou longe de vocês e não posso ir até a clínica' },
      ],
      // Quem não consegue se deslocar até a clínica não segue no formulário —
      // ver EXIT_SENTINEL logo abaixo.
      next(value) {
        if (value === 'longe_nao_posso_ir') return EXIT_SENTINEL;
      },
    },
    // Pergunta "Qual tratamento você procura?" removida a pedido do cliente
    // (15/07/2026). O backend (quiz-response.js) segue tolerante: o campo
    // "Tratamento" do Kommo só é enviado quando a resposta existe — pra
    // reativar, basta recolocar a pergunta aqui com key 'tratamento'.
    {
      key: 'ultima_vez',
      type: 'choice',
      tag: 'Pergunta 2',
      title: 'Quando foi a última vez que você fez algum tratamento odontológico?',
      options: [
        { value: 'em_tratamento',   label: 'Estou em tratamento atualmente' },
        { value: 'menos_1_mes',     label: 'Há menos de 1 mês' },
        { value: 'entre_1_3_meses', label: 'Entre 1 e 3 meses' },
        { value: 'entre_3_6_meses', label: 'Entre 3 e 6 meses' },
        { value: 'mais_6_meses',    label: 'Há mais de 6 meses' },
      ],
    },
    {
      key: 'urgencia',
      type: 'choice',
      tag: 'Pergunta 3',
      title: 'O quanto esse tratamento é urgente para você?',
      options: [
        { value: 'urgente',    label: 'É urgente, quero resolver agora' },
        { value: 'pressa',     label: 'Tenho pressa, mas quero ter certeza do resultado' },
        { value: 'pesquisando', label: 'Estou pesquisando valores' },
        { value: 'sem_pressa', label: 'Não é urgente para mim no momento' },
      ],
    },
    {
      key: 'airflow',
      type: 'choice',
      tag: 'Pergunta 4',
      title: 'Você já conhece o AIRFLOW?',
      options: [
        { value: 'ja_fiz',       label: 'Sim, conheço e já fiz antes' },
        { value: 'conheco',      label: 'Sim, conheço, mas ainda não fiz' },
        { value: 'ja_ouvi',      label: 'Já ouvi falar, mas quero entender melhor' },
        { value: 'nao_conhecia', label: 'Ainda não conhecia e quero saber se é indicado para mim' },
      ],
    },
    {
      key: 'valoriza',
      type: 'choice',
      tag: 'Pergunta 5',
      // Ancoragem de preço: vídeo primeiro, o texto vem DEPOIS do vídeo, e a
      // pergunta por último (ordem controlada pelo campo `intro` — ver renderQuestion).
      intro: 'O AIRFLOW é uma limpeza profissional com tecnologia e protocolo específicos. Por isso, tem um investimento acima de uma limpeza convencional.',
      title: 'O que você mais valoriza na hora de escolher uma clínica para cuidar do seu sorriso?',
      video: '/odonto/assets/airflow-video.mp4',
      options: [
        { value: 'qualidade',   label: 'Qualidade técnica e segurança' },
        { value: 'experiencia', label: 'Uma experiência acolhedora e personalizada, com cuidado em cada etapa' },
        { value: 'localizacao', label: 'Localização e praticidade' },
        { value: 'preco',       label: 'Encontrar o melhor preço' },
      ],
    },
    {
      key: 'nome',
      type: 'text',
      tag: 'Quase lá',
      title: 'Como podemos te chamar?',
      placeholder: 'Seu primeiro nome',
    },
    {
      key: 'email',
      type: 'email',
      tag: 'Falta pouco',
      title: 'Qual é o seu melhor e-mail?',
      sub: 'Usamos para entrar em contato com você.',
      placeholder: 'nome@email.com',
    },
    {
      key: 'telefone',
      type: 'phone',
      tag: 'Último passo',
      title: 'Qual o seu WhatsApp?',
      sub: 'Só números, com DDD (o DDI é opcional).',
      placeholder: '11987654321',
    },
  ];

  // Critério de qualificação — placeholder: todo lead completo qualifica.
  // Refinar quando as lógicas condicionais do cliente forem definidas.
  function isQualified(answers) {
    return Boolean(answers.email && answers.telefone);
  }

  // =========================================================================
  // TRACKING — pixel (browser) + /tracker (servidor), dedup por event_id
  // =========================================================================

  function fireEvent(eventName, userData, custom) {
    const eventID = crypto.randomUUID();
    if (typeof fbq === 'function' && /^\d+$/.test(window.META_PIXEL_ID)) {
      const std = ['Lead', 'CompleteRegistration', 'Contact', 'Purchase', 'PageView'];
      fbq(std.includes(eventName) ? 'track' : 'trackCustom', eventName, custom || {}, { eventID });
    }
    return fetch('/tracker', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        event_name: eventName,
        event_id: eventID,
        event_time: Math.floor(Date.now() / 1000),
        event_source_url: location.href,
        user_data: userData || {},
      }),
    }).catch(() => {});
  }

  // PageView server-side (o middleware já gravou a session; isso alimenta o CAPI)
  fireEvent('PageView');

  // Versão legível de cada resposta (pergunta + label da opção escolhida, não
  // o slug interno) — o backend usa isso pra montar a nota no CRM (Kommo).
  function labelAnswers() {
    return QUESTIONS.map(q => {
      const raw = answers[q.key];
      let label = raw;
      if (q.type === 'choice') {
        const opt = q.options.find(o => o.value === raw);
        if (opt) label = opt.label;
      }
      return { question: q.title, key: q.key, value: raw, label };
    }).filter(a => a.value != null && a.value !== '');
  }

  function persistResponses() {
    return fetch('/quiz-response', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        first_name: answers.nome || '',
        email: answers.email || '',
        phone: answers.telefone || '',
        answers: answers,
        answers_labeled: labelAnswers(),
        qualified: isQualified(answers),
        event_source_url: location.href,
      }),
    }).catch(() => {});
  }

  // =========================================================================
  // MOTOR DO FORMULÁRIO
  // =========================================================================

  const answers = {};
  let stepIndex = -1;            // -1 = welcome, QUESTIONS.length = final
  let leadFired = false;
  let flowExited = false;        // true quando um next() retornou EXIT_SENTINEL
  const root = document.getElementById('screen-root');
  const fill = document.getElementById('progress-fill');
  const header = document.querySelector('header');
  const history = [];

  function updateProgress() {
    const total = QUESTIONS.length + 1;
    const done = flowExited ? total : Math.max(0, Math.min(stepIndex + 1, total));
    fill.style.width = `${(done / total) * 100}%`;
  }

  // A logo pequena do topo só aparece durante as perguntas — nas telas de
  // boas-vindas, saída antecipada e obrigado ela some (cada uma já tem a
  // logo grande) para não ficar redundante. Some também ao rolar (telas
  // mais altas, ex: vídeo).
  function syncHeaderVisibility() {
    const onQuestion = !flowExited && stepIndex >= 0 && stepIndex < QUESTIONS.length;
    const scrolledPast = window.scrollY > 24;
    header.classList.toggle('header-hidden', !onQuestion || scrolledPast);
  }

  function transitionTo(renderFn) {
    const current = root.firstElementChild;
    const finish = () => {
      renderFn();
      window.scrollTo(0, 0);
      syncHeaderVisibility();
    };
    if (current) {
      current.classList.add('leaving');
      setTimeout(() => { root.innerHTML = ''; finish(); }, 240);
    } else {
      finish();
    }
    updateProgress();
  }

  function el(html) {
    const t = document.createElement('template');
    t.innerHTML = html.trim();
    return t.content.firstElementChild;
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // ---- telas ----

  function renderWelcome() {
    const s = el(`
      <div class="screen center">
        <img class="logo-big" src="/odonto/assets/logo-ceci.png" alt="CECI">
        <h1>Seu sorriso merece<br>um cuidado especial</h1>
        <p class="sub">Responda algumas perguntas rápidas (leva menos de 1 minuto)<br>e agende sua avaliação na CECI.</p>
        <div class="actions" style="justify-content:center">
          <button class="btn" id="start">Começar</button>
        </div>
      </div>
    `);
    s.querySelector('#start').addEventListener('click', () => startFlow(s.querySelector('.logo-big')));
    root.appendChild(s);
  }

  function renderQuestion(q) {
    const isInput = q.type !== 'choice';
    const videoHtml = q.video ? `
          <div class="video-wrap">
            <video id="q-video" playsinline preload="metadata"
              disablePictureInPicture controlsList="nodownload noremoteplayback"
              oncontextmenu="return false">
              <source src="${escapeHtml(q.video)}" type="video/mp4">
            </video>
            <button type="button" class="video-play" id="video-play" aria-label="Reproduzir vídeo">
              <svg viewBox="0 0 24 24" width="26" height="26" fill="white" style="margin-left:3px"><path d="M8 5v14l11-7z"/></svg>
            </button>
          </div>
          <div class="video-progress-track"><div class="video-progress-fill" id="video-progress-fill"></div></div>
    ` : '';
    // Com `intro`, a ordem da tela muda: vídeo em cima, texto introdutório no
    // meio e a pergunta embaixo (usado na tela de ancoragem do AIRFLOW).
    // Sem `intro`, layout padrão: pergunta, subtítulo, vídeo.
    const headHtml = q.intro ? `
        ${videoHtml}
        <p class="sub">${escapeHtml(q.intro)}</p>
        <h2>${escapeHtml(q.title)}</h2>
    ` : `
        <h2>${escapeHtml(q.title)}</h2>
        ${q.sub ? `<p class="sub">${escapeHtml(q.sub)}</p>` : ''}
        ${videoHtml}
    `;
    const s = el(`
      <div class="screen">
        <div class="step-tag">${escapeHtml(q.tag || '')}</div>
        ${headHtml}
        ${isInput ? `
          <div class="field">
            <input id="answer-input"
              type="${q.type === 'email' ? 'email' : (q.type === 'phone' ? 'tel' : 'text')}"
              inputmode="${q.type === 'phone' ? 'numeric' : (q.type === 'email' ? 'email' : 'text')}"
              ${q.type === 'phone' ? 'maxlength="13"' : ''}
              placeholder="${escapeHtml(q.placeholder || '')}"
              autocomplete="${q.type === 'email' ? 'email' : (q.type === 'phone' ? 'tel' : 'given-name')}">
            <div class="error" id="error"></div>
          </div>
          <div class="actions">
            <button class="btn" id="ok">OK</button>
          </div>
        ` : `
          <div class="options">
            ${q.options.map((o, i) => `
              <button class="opt" data-value="${escapeHtml(o.value)}">
                <span class="key">${String.fromCharCode(65 + i)}</span>
                <span>${escapeHtml(o.label)}</span>
              </button>
            `).join('')}
          </div>
        `}
        <button class="back ${history.length === 0 ? 'hidden' : ''}" id="back">← Voltar</button>
      </div>
    `);

    if (q.video) {
      const videoEl = s.querySelector('#q-video');
      const playBtn = s.querySelector('#video-play');
      const progressFill = s.querySelector('#video-progress-fill');
      let lastGoodTime = 0;

      // O botão só aparece quando o vídeo está parado (início, ou depois de
      // pausado): some assim que o play começa. Pausar acontece tocando no
      // próprio vídeo — sem barra de progresso exposta, não há como a
      // pessoa avançar/retroceder.
      const toggle = () => { videoEl.paused ? videoEl.play() : videoEl.pause(); };
      playBtn.addEventListener('click', toggle);
      videoEl.addEventListener('click', toggle);

      videoEl.addEventListener('play', () => playBtn.classList.add('hidden'));
      videoEl.addEventListener('pause', () => playBtn.classList.remove('hidden'));
      videoEl.addEventListener('ended', () => {
        videoEl.currentTime = 0;
        lastGoodTime = 0;
        progressFill.style.width = '0%';
        playBtn.classList.remove('hidden');
      });

      videoEl.addEventListener('timeupdate', () => {
        lastGoodTime = videoEl.currentTime;
        if (videoEl.duration) {
          progressFill.style.width = `${(videoEl.currentTime / videoEl.duration) * 100}%`;
        }
      });
      // Segunda trava (ex: teclas de mídia do teclado/fone) que desfaz
      // qualquer salto e devolve o vídeo ao ponto onde estava.
      videoEl.addEventListener('seeking', () => {
        if (Math.abs(videoEl.currentTime - lastGoodTime) > 0.5) {
          videoEl.currentTime = lastGoodTime;
        }
      });
    }

    if (isInput) {
      const input = s.querySelector('#answer-input');
      if (q.type === 'phone') {
        input.addEventListener('input', () => {
          input.value = input.value.replace(/\D/g, '').slice(0, 13);
        });
      }
      const submit = () => {
        const raw = input.value.trim();
        const err = validate(q, raw);
        if (err) { s.querySelector('#error').textContent = err; return; }
        s.querySelector('#error').textContent = '';
        saveAnswer(q, raw);
      };
      s.querySelector('#ok').addEventListener('click', submit);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); submit(); } });
      setTimeout(() => input.focus(), 350);
    } else {
      s.querySelectorAll('.opt').forEach(btn => {
        btn.addEventListener('click', () => {
          s.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          setTimeout(() => saveAnswer(q, btn.getAttribute('data-value')), 220);
        });
      });
    }

    s.querySelector('#back').addEventListener('click', goBack);
    root.appendChild(s);
  }

  // Número + mensagem pré-preenchida do botão de WhatsApp na tela final.
  const WHATSAPP_NUMBER = '5511917884376';
  const WHATSAPP_MESSAGE = 'Olá, acabei de preencher o formulário e quero saber mais sobre o Airflow';

  function renderFinal() {
    const qualified = isQualified(answers);
    const whatsappUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(WHATSAPP_MESSAGE)}`;
    const s = el(`
      <div class="screen center">
        <img class="logo-big" src="/odonto/assets/logo-ceci.png" alt="CECI">
        <h2>${answers.nome ? `Obrigado, ${escapeHtml(answers.nome)}!` : 'Obrigado!'}</h2>
        <p class="sub">${qualified
          ? 'Recebemos suas respostas. Nossa equipe vai entrar em contato pelo WhatsApp para agendar sua avaliação.'
          : 'Recebemos suas respostas. Em breve entraremos em contato.'}</p>
        <p class="sub" style="margin-top:1.25rem">Caso você queira agilizar o seu atendimento, clique no botão abaixo</p>
        <a class="whatsapp-btn" href="${whatsappUrl}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12.001 2C6.478 2 2 6.477 2 12c0 1.887.525 3.65 1.436 5.156L2 22l4.98-1.393A9.958 9.958 0 0 0 12.001 22C17.524 22 22 17.523 22 12S17.524 2 12.001 2zm0 18.222a8.19 8.19 0 0 1-4.2-1.152l-.301-.18-3.117.872.834-3.037-.196-.312A8.19 8.19 0 0 1 3.78 12c0-4.535 3.687-8.222 8.221-8.222 4.535 0 8.222 3.687 8.222 8.222 0 4.535-3.687 8.222-8.222 8.222z"/></svg>
          Falar no WhatsApp
        </a>
      </div>
    `);
    root.appendChild(s);
  }

  // Tela de saída antecipada — quando uma resposta desqualifica a pessoa
  // antes do fim do formulário (ex: não consegue se deslocar até a clínica).
  function renderExit(message) {
    const s = el(`
      <div class="screen center">
        <img class="logo-big" src="/odonto/assets/logo-ceci.png" alt="CECI">
        <h2>Obrigado pelo interesse</h2>
        <p class="sub">${escapeHtml(message)}</p>
      </div>
    `);
    root.appendChild(s);
  }

  // ---- validação ----

  function validate(q, value) {
    if (!value) return 'Esse campo é obrigatório.';
    if (q.type === 'email' && !/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(value)) {
      return 'Digite um e-mail válido.';
    }
    if (q.type === 'phone') {
      const digits = value.replace(/\D/g, '');
      if (digits.length < 10 || digits.length > 13) return 'Digite um telefone válido com DDD.';
    }
    return '';
  }

  // ---- fluxo ----

  function saveAnswer(q, value) {
    answers[q.key] = value;

    // Lead dispara assim que o e-mail é preenchido (perto do fim do fluxo,
    // depois das perguntas de qualificação — ver docs/QUIZ-PATTERNS.md)
    if (q.type === 'email' && !leadFired) {
      leadFired = true;
      fireEvent('Lead', { em: value });
    }

    // branching condicional (quando existir next() na pergunta)
    if (typeof q.next === 'function') {
      const targetKey = q.next(value, answers);
      if (targetKey === EXIT_SENTINEL) {
        exitFlow('Infelizmente, para realizar o procedimento, você precisa ir à nossa clínica, por isso precisamos que você tenha disponibilidade de deslocamento.');
        return;
      }
      const idx = QUESTIONS.findIndex(x => x.key === targetKey);
      if (idx >= 0) { history.push(stepIndex); stepIndex = idx; transitionTo(() => renderQuestion(QUESTIONS[stepIndex])); return; }
    }
    next();
  }

  function exitFlow(message) {
    flowExited = true;
    transitionTo(() => renderExit(message));
  }

  function next() {
    history.push(stepIndex);
    stepIndex += 1;
    if (stepIndex >= QUESTIONS.length) {
      persistResponses();
      transitionTo(renderFinal);
    } else {
      transitionTo(() => renderQuestion(QUESTIONS[stepIndex]));
    }
  }

  // Anima a logo grande da tela de boas-vindas "voando" até o tamanho e a
  // posição exatos da logo pequena do topo, e só então revela as perguntas.
  // Puramente cosmético: qualquer problema (ex: prefers-reduced-motion) cai
  // de volta no fluxo normal sem animação.
  function startFlow(logoBigEl) {
    const startBtn = document.getElementById('start');
    if (startBtn) startBtn.disabled = true;

    const headerImg = header.querySelector('img');
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (!logoBigEl || !headerImg || reduceMotion) { next(); return; }

    const fromRect = logoBigEl.getBoundingClientRect();
    const toRect = headerImg.getBoundingClientRect();

    const clone = logoBigEl.cloneNode();
    clone.style.cssText = `
      position: fixed; margin: 0; border-radius: 50%; z-index: 999;
      pointer-events: none;
      left: ${fromRect.left}px; top: ${fromRect.top}px;
      width: ${fromRect.width}px; height: ${fromRect.height}px;
      box-shadow: 0 8px 30px rgba(169,112,112,.30);
      transition: left .6s cubic-bezier(.4,0,.2,1), top .6s cubic-bezier(.4,0,.2,1),
                  width .6s cubic-bezier(.4,0,.2,1), height .6s cubic-bezier(.4,0,.2,1),
                  box-shadow .6s ease;
    `;
    document.body.appendChild(clone);
    logoBigEl.style.visibility = 'hidden';

    requestAnimationFrame(() => {
      header.classList.remove('header-hidden'); // fade-in do header em paralelo ao voo
      clone.style.left = toRect.left + 'px';
      clone.style.top = toRect.top + 'px';
      clone.style.width = toRect.width + 'px';
      clone.style.height = toRect.height + 'px';
      clone.style.boxShadow = '0 2px 10px rgba(74,53,53,.12)';
    });

    setTimeout(() => { clone.remove(); next(); }, 620);
  }

  function goBack() {
    if (history.length === 0) return;
    stepIndex = history.pop();
    if (stepIndex === -1) { transitionTo(renderWelcome); }
    else { transitionTo(() => renderQuestion(QUESTIONS[stepIndex])); }
  }

  // Enter na tela de boas-vindas
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && stepIndex === -1) next();
  });

  // A logo some ao rolar (só entra em jogo em telas mais altas que a
  // viewport, como a do vídeo) para não ficar flutuando sobre o conteúdo.
  let scrollTicking = false;
  window.addEventListener('scroll', () => {
    if (scrollTicking) return;
    scrollTicking = true;
    requestAnimationFrame(() => {
      syncHeaderVisibility();
      scrollTicking = false;
    });
  }, { passive: true });

  renderWelcome();
  updateProgress();
  syncHeaderVisibility();
})();
</script>
</body>
</html>
